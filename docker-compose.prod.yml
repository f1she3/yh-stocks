services:
  web:
    command: >
      uvicorn app.server:app
        --host 0.0.0.0
        --port 8000
        --workers 2
    environment:
      - LOG_LEVEL=INFO
      - CACHE_TTL_SECONDS=7200
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
